name: vohive

services:
  vohive:
    image: "${VOHIVE_IMAGE:?Set VOHIVE_IMAGE to ghcr.io/Starktomy/vohive@sha256:<digest>}"
    container_name: vohive
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      TZ: "${TZ:-UTC}"
      CONFIG_PATH: /app/config/config.yaml
    volumes:
      - "${VOHIVE_CONFIG_DIR:-./config}:/app/config"
      - "${VOHIVE_DATA_DIR:-./data}:/app/data"
      - "${VOHIVE_LOG_DIR:-./logs}:/app/logs"
      - /dev:/dev
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://127.0.0.1:7575/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
