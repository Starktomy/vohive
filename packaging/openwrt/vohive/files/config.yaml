server:
  debug: false
  port: 7575

# 可管理设备数上限，0 表示无限制
free_device_limit: 5

web:
  username: admin
  password: admin

# 公网 IP 探测源按顺序回退，每个地址族最多 4 个，仅支持返回单一公网 IP 的 HTTPS 端点。
# 留空时使用内置默认源；中国大陆网络建议将自建的境内双栈回显端点放在首位。
# HTTPS 探测要求安装 ca-bundle（或等价 ca-certificates）；不要关闭 TLS 证书校验。
# public_ip_probe:
#   ipv4_urls:
#     - https://your-ipv4-endpoint.example
#   ipv6_urls:
#     - https://your-ipv6-endpoint.example

devices: []

vowifi:
  enabled: false

webhook:
  enabled: false
