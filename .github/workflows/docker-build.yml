name: Build Development Container

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push immutable edge tag to GHCR
        required: false
        type: boolean
        default: false
      enable_upx:
        description: Enable UPX compression
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  EXPECTED_REPOSITORY: Starktomy/vohive
  CONTAINER_IMAGE: ghcr.io/Starktomy/vohive
  SOURCE_URL: https://github.com/Starktomy/vohive

jobs:
  validate:
    name: Validate manual container gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Enforce publishing identity
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REPOSITORY}" != "${EXPECTED_REPOSITORY}" ]]; then
            echo "This workflow may build only for ${EXPECTED_REPOSITORY}; got ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Run manual container gates
        run: ./scripts/ci.sh workflow-lint hygiene release-hygiene container-hygiene tidy test

  build:
    name: Build edge image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare build variables
        id: vars
        shell: bash
        env:
          VOHIVE_MINISIGN_PUBLIC_KEYS: ${{ vars.VOHIVE_MINISIGN_PUBLIC_KEYS }}
        run: |
          set -euo pipefail
          revision="$(git rev-parse HEAD)"
          public_key_pattern='^RW[A-Za-z0-9+/]{54}(;RW[A-Za-z0-9+/]{54})*$'
          if [[ -z "${VOHIVE_MINISIGN_PUBLIC_KEYS}" ]] || ! [[ "${VOHIVE_MINISIGN_PUBLIC_KEYS}" =~ ${public_key_pattern} ]]; then
            echo "VOHIVE_MINISIGN_PUBLIC_KEYS must contain one or more semicolon-separated minisign public keys." >&2
            exit 1
          fi
          {
            echo "version=dev-${revision:0:12}"
            echo "revision=${revision}"
            echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "tag=${CONTAINER_IMAGE}:edge-${revision:0:12}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build development image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.github
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push }}
          tags: ${{ steps.vars.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ env.SOURCE_URL }}
            org.opencontainers.image.revision=${{ steps.vars.outputs.revision }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            BUILDTIME=${{ steps.vars.outputs.build_time }}
            REVISION=${{ steps.vars.outputs.revision }}
            SOURCE_URL=${{ env.SOURCE_URL }}
            ENABLE_UPX=${{ inputs.enable_upx }}
            VOHIVE_MINISIGN_PUBLIC_KEYS=${{ vars.VOHIVE_MINISIGN_PUBLIC_KEYS }}

      - name: Attest pushed image
        if: inputs.push
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.CONTAINER_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
